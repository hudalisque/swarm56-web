# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;

    server_name swarm56.com www.swarm56.com;

    return 301 https://$host$request_uri;
}

# HTTPS (primary)
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name swarm56.com www.swarm56.com;

    ssl_certificate     /etc/letsencrypt/live/swarm56.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swarm56.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # v5 볼트 이미지 서빙: 카드 thumbnailPath=/vault/<채널>/_assets/x.webp
    # → 옵시디언 볼트 raw/ 하위 파일을 정적 서빙 (Next 거치지 않음, 읽기 전용)
    location /vault/ {
        alias /var/lib/swarm56/vault/raw/;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }
}
